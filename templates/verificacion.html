<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paso de Mando | Verificación SSPC</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .verify-card { background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(201,168,76,0.1); border-left-color: #c9a84c; border-radius: 50%; margin: 0 auto 20px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn { display: inline-block; background: #c9a84c; color: #000; padding: 12px 30px; border-radius: 50px; font-weight: 700; text-decoration: none; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #e0bc5a; transform: translateY(-3px); }
        .status-msg { font-size: 1.4rem; font-weight: 800; margin-bottom: 10px; }
        .status-desc { color: #888; font-size: 0.95rem; line-height: 1.5; }
    </style>
</head>

<body>
    <div class="verify-card">
        <div id="loading">
            <div class="spinner"></div>
            <p>Comprobando Rango Policial...</p>
        </div>

        <div id="result" style="display:none">
            <h1 id="title" class="status-msg"></h1>
            <p id="desc" class="status-desc"></p>
            <a href="index.html" class="btn">Volver al Portal</a>
        </div>
    </div>

    <script>
        const GUILD_ID = '1496724468012285982'; // Tu servidor de Discord
        const ROLE_ID = '1496724468033261706';  // El rol de Oficial / Staff

        async function verifyMember() {
            const hash = new URLSearchParams(window.location.hash.slice(1));
            const token = hash.get('access_token');

            if (!token) {
                showResult('❌ Sesión Expirada', 'No se detectó el token de Discord. Por favor, intenta ingresar de nuevo.');
                return;
            }

            try {
                // Consultamos directamente el "Member Object" del usuario logueado en ESE servidor específico
                // Esto es posible gracias al scope "guilds.members.read"
                const response = await fetch(`https://discord.com/api/users/@me/guilds/${GUILD_ID}/member`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 404) {
                    showResult('🚫 No Detectado', 'No hemos encontrado tu registro en el servidor de la SSPC Sinaloa. Asegúrate de haberte unido.');
                    return;
                }

                if (!response.ok) {
                    throw new Error('Error al conectar con la base de datos de Discord.');
                }

                const memberData = await response.json();
                const hasTheRole = memberData.roles.includes(ROLE_ID);

                if (hasTheRole) {
                    // Obtener perfil
                    const uResp = await fetch('https://discord.com/api/users/@me', {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    const userData = await uResp.json();

                    // Guardar Sesión
                    const sessionData = {
                        username: userData.username,
                        discriminator: userData.discriminator,
                        avatar: userData.avatar ? `https://cdn.discordapp.com/avatars/${userData.id}/${userData.avatar}.png` : 'https://cdn.discordapp.com/embed/avatars/0.png',
                        roles: memberData.roles, // Guardamos todos los roles para el rango
                        isVerified: true
                    };
                    localStorage.setItem('sspc_session', JSON.stringify(sessionData));

                    // REDIRECCIÓN INMEDIATA
                    window.location.href = 'dashboard.html';
                } else {
                    showResult('❌ Rango Insuficiente', 'Tu identidad es válida, pero no posees el Rol Institucional requerido para acceder.');
                }

            } catch (err) {
                console.error(err);
                showResult('⚠️ Error de Sistema', 'Ocurrió un problema técnico. Intenta recargar la página.');
            }
        }

        function showResult(title, desc) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            document.getElementById('title').textContent = title;
            document.getElementById('desc').textContent = desc;
        }

        window.onload = verifyMember;
    </script>
</body>

</html>
